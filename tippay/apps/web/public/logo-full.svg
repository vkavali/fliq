<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 80" fill="none">

  <!-- Merged F/₹ character in gold -->
  <g stroke="#E8A800" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stroke — full height (the F spine) -->
    <line x1="10" y1="8" x2="10" y2="72" stroke-width="7"/>
    <!-- Top horizontal bar -->
    <line x1="10" y1="8" x2="52" y2="8" stroke-width="6"/>
    <!-- Middle horizontal bar -->
    <line x1="10" y1="30" x2="45" y2="30" stroke-width="6"/>
    <!-- ₹ diagonal sweep — from upper right area down to lower left -->
    <path d="M48 12 C40 32, 28 50, 10 68" stroke-width="6"/>
  </g>

  <!-- "liq" in dark -->
  <text x="68" y="68" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#2D3436" letter-spacing="-2">liq</text>
</svg>