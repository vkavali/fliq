  <!-- Beta badge -->
  <rect x="495" y="55" width="48" height="20" rx="10" fill="#00B894"/>
  <text x="507" y="69" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="10" font-weight="700" fill="white">BETA</text>
