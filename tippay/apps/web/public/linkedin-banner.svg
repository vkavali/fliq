<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="50%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <circle cx="80" cy="30" r="40" fill="rgba(255,255,255,0.05)"/>
  <circle cx="200" cy="150" r="60" fill="rgba(255,255,255,0.04)"/>
  <circle cx="900" cy="40" r="50" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1050" cy="140" r="35" fill="rgba(255,255,255,0.04)"/>

  <!-- Logo icon (F+₹ merged) -->
  <rect x="390" y="35" width="52" height="52" rx="13" fill="rgba(255,255,255,0.2)"/>
  <path d="M406 45 L406 77" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <line x1="406" y1="45" x2="428" y2="45" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="406" y1="55" x2="424" y2="55" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M424 48 C421 58, 416 64, 406 72" stroke="#00B894" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="430" cy="43" r="2.5" fill="#00B894"/>

  <!-- Wordmark "liq" -->
  <text x="452" y="76" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="32" font-weight="800" fill="white" letter-spacing="-0.5">liq</text>

  <!-- Beta badge -->
  <text x="520" y="69" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="10" font-weight="700" fill="white">
    <tspan dx="4" dy="0" fill="#00B894" font-size="11">BETA</tspan>
  </text>

  <!-- Tagline -->
  <text x="390" y="108" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)">Scan. Fliq. Done.</text>

  <!-- Subtitle -->
  <text x="390" y="130" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.6)">India's UPI-native tipping platform</text>
</svg>